        :root {
            --sage-green: #A3B18A;
            --forest-dark: #3A5A40;
            --techo-paper: #FCF8F3;
            --earth-brown: #BC6C25;
            --wax-seal: #D4A373;
            --soft-glow: 0 20px 25px -5px rgba(58, 90, 64, 0.05), 0 10px 10px -5px rgba(58, 90, 64, 0.04);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #DAD7CD; 
            background-image: 
                radial-gradient(#A3B18A 1px, transparent 1px),
                linear-gradient(to right, #DAD7CD 0%, #E3E1D9 100%);
            background-size: 30px 30px, 100% 100%;
            /* 避免下拉更新干擾 PWA 體驗 */
            overscroll-behavior-y: none;
        }

        .premium-card {
            background-color: var(--techo-paper);
            border-radius: 2.5rem;
            box-shadow: var(--soft-glow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.3s ease;
        }

        .wax-seal-badge {
            background: linear-gradient(135deg, #D4A373 0%, #A98467 100%);
            box-shadow: 0 4px 6px rgba(169, 132, 103, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .handwritten-label {
            font-family: 'Noto Serif TC', serif;
            letter-spacing: 0.05em;
        }

        /* 輸入框質感 */
        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border: 2px solid #E3E1D9;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-input:focus {
            background: white;
            border-color: var(--sage-green);
            box-shadow: 0 0 0 4px rgba(163, 177, 138, 0.15);
        }

        /* 呼吸動畫 */
        .float-gentle {
            animation: floatGentle 4s infinite ease-in-out;
        }
        @keyframes floatGentle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 特殊質感按鈕 */
        .btn-techo {
            background-color: var(--forest-dark);
            color: #FEFAE0;
            box-shadow: 0 4px 0px #2A3F2D;
            transition: all 0.2s;
        }
        .btn-techo:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px #2A3F2D;
        }
